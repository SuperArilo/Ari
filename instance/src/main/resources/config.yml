lang: cn
data:
  # mysql, sqlite
  storage-type: sqlite
  # mysql 才有效
  address: localhost
  port: 3306
  database: ari
  table-prefix: ari_
  username: root
  password: 123456
  maximum-pool-size: 10
  minimum-idle: 10
  maximum-lifetime: 1800000
  connection-timeout: 5000
  keepalive-time: 0
server:
  custom-death: false
  skip-night:
    enable: true
    tick-increment: 5
    max-tick-increment: 50
  message:
    on-first-login: true
    on-login: true
    on-leave: true
  whitelist:
    enable: true
  #秒
  save-interval: 300 # 5分钟
  teleport:
    tpa:
      delay: 3
      cooldown: 10
    back:
      delay: 3
      cooldown: 10
    home:
      delay: 3
      cooldown: 10
    rtp:
      delay: 3
      cooldown: 10
    warp:
      delay: 3
      cooldown: 10
debug:
  enable: true
  overwrite-file: true
